# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: contoso-market-research
description: >
  Contoso's Market Research AI assistant with sanitized data access
  and code execution tools. Demonstrates how a co-located code
  interpreter can bypass PII safeguards via direct database access.
metadata:
  authors:
    - Contoso
  tags:
    - Microsoft Agent Framework
    - Market Research
    - Security Demo
protocols:
  - protocol: responses
    version: v1
environment_variables:
  - name: PROJECT_ENDPOINT
    value: "{{PROJECT_ENDPOINT}}"
  - name: MODEL_DEPLOYMENT_NAME
    value: "{{MODEL_DEPLOYMENT_NAME}}"
  - name: DATABASE_URL
    value: "{{DATABASE_URL}}"
dockerfile_path: Dockerfile
resources:
  cpu: '1.0'
  memory: 2.0Gi
